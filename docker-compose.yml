version: '3.8'

services:
  # PostgreSQL Database (Optional - for production)
  db:
    image: postgres:15-alpine
    container_name: mindcare_db
    environment:
      POSTGRES_DB: mental_health_db
      POSTGRES_USER: mindcare_user
      POSTGRES_PASSWORD: mindcare_password_2026
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - mindcare_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mindcare_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Flask Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mindcare_api
    environment:
      FLASK_APP: app.py
      FLASK_ENV: production
      SQLALCHEMY_DATABASE_URI: postgresql://mindcare_user:mindcare_password_2026@db:5432/mental_health_db
      SECRET_KEY: mental-health-secret-key-2026
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
    networks:
      - mindcare_network
    command: gunicorn --bind 0.0.0.0:5000 app:app

  # Frontend (Nginx)
  frontend:
    image: nginx:alpine
    container_name: mindcare_frontend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
    networks:
      - mindcare_network

  # Redis Cache (Optional)
  redis:
    image: redis:7-alpine
    container_name: mindcare_redis
    ports:
      - "6379:6379"
    networks:
      - mindcare_network
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:

networks:
  mindcare_network:
    driver: bridge
