<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MindCare - Sign Up</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .auth-container {
            min-height: 100vh;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        .auth-card {
            background: white;
            border-radius: 1rem;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 450px;
            padding: 2rem;
            animation: slideUp 0.5s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .auth-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .auth-logo {
            font-size: 3rem;
            margin-bottom: 0.5rem;
        }

        .auth-title {
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--text-primary);
            margin-bottom: 0.5rem;
        }

        .auth-subtitle {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .form-group {
            margin-bottom: 1.2rem;
        }

        .form-label {
            font-weight: 600;
            color: var(--text-primary);
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.95rem;
        }

        .form-control {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 2px solid var(--border-color);
            border-radius: 0.5rem;
            font-size: 0.95rem;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        .form-control:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
            outline: none;
        }

        .form-control::placeholder {
            color: var(--text-secondary);
        }

        .password-strength {
            margin-top: 0.5rem;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            overflow: hidden;
        }

        .password-strength-bar {
            height: 100%;
            width: 0%;
            background: var(--danger-color);
            transition: all 0.3s ease;
        }

        .password-strength-bar.weak {
            width: 33%;
            background: var(--warning-color);
        }

        .password-strength-bar.medium {
            width: 66%;
            background: var(--info-color);
        }

        .password-strength-bar.strong {
            width: 100%;
            background: var(--success-color);
        }

        .btn-signup {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
            border: none;
            border-radius: 0.5rem;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 1rem;
        }

        .btn-signup:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(99, 102, 241, 0.3);
        }

        .btn-signup:active {
            transform: translateY(0);
        }

        .terms {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-top: 1rem;
            line-height: 1.4;
        }

        .terms a {
            color: var(--primary-color);
            text-decoration: none;
        }

        .terms a:hover {
            text-decoration: underline;
        }

        .auth-link {
            text-align: center;
            margin-top: 1.5rem;
        }

        .auth-link p {
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin: 0;
        }

        .auth-link a {
            color: var(--primary-color);
            font-weight: 700;
            text-decoration: none;
        }

        .auth-link a:hover {
            color: var(--secondary-color);
        }

        .error-message {
            color: var(--danger-color);
            font-size: 0.9rem;
            margin-top: 0.3rem;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        .success-message {
            color: var(--success-color);
            font-size: 0.9rem;
            margin-top: 0.3rem;
            display: none;
        }

        .success-message.show {
            display: block;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 1rem;
        }

        .loading.show {
            display: block;
        }

        .spinner {
            border: 3px solid rgba(99, 102, 241, 0.1);
            border-top-color: var(--primary-color);
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 0.6s linear infinite;
            display: inline-block;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .form-check {
            display: flex;
            align-items: flex-start;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }

        .form-check-input {
            width: 1.1rem;
            height: 1.1rem;
            cursor: pointer;
            accent-color: var(--primary-color);
            margin-top: 0.2rem;
            flex-shrink: 0;
        }

        .form-check-label {
            cursor: pointer;
            font-size: 0.9rem;
            color: var(--text-secondary);
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <div class="auth-logo">🧠</div>
                <h1 class="auth-title">Create Account</h1>
                <p class="auth-subtitle">Join our community for better mental health</p>
            </div>

            <form id="signupForm">
                <div class="form-group">
                    <label class="form-label" for="fullname">Full Name</label>
                    <input 
                        type="text" 
                        id="fullname" 
                        class="form-control" 
                        placeholder="Your full name"
                        required
                    >
                    <div class="error-message" id="fullnameError"></div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="email">Email Address</label>
                    <input 
                        type="email" 
                        id="email" 
                        class="form-control" 
                        placeholder="your@email.com"
                        required
                    >
                    <div class="error-message" id="emailError"></div>
                    <div class="success-message" id="emailSuccess">✓ Email looks good</div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="username">Username</label>
                    <input 
                        type="text" 
                        id="username" 
                        class="form-control" 
                        placeholder="Choose a username"
                        required
                    >
                    <div class="error-message" id="usernameError" style="font-size: 0.85rem;">
                        3-20 characters, letters, numbers, underscore only
                    </div>
                    <div class="success-message" id="usernameSuccess">✓ Username available</div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="password">Password</label>
                    <input 
                        type="password" 
                        id="password" 
                        class="form-control" 
                        placeholder="Create a strong password"
                        required
                    >
                    <div class="password-strength">
                        <div class="password-strength-bar" id="strengthBar"></div>
                    </div>
                    <div class="error-message" id="passwordError"></div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="confirmPassword">Confirm Password</label>
                    <input 
                        type="password" 
                        id="confirmPassword" 
                        class="form-control" 
                        placeholder="Confirm your password"
                        required
                    >
                    <div class="error-message" id="confirmError"></div>
                </div>

                <div class="form-check">
                    <input 
                        type="checkbox" 
                        id="terms" 
                        class="form-check-input"
                        required
                    >
                    <label class="form-check-label" for="terms">
                        I agree to the <a href="#">Terms and Conditions</a>
                    </label>
                </div>

                <div class="form-check">
                    <input 
                        type="checkbox" 
                        id="privacy" 
                        class="form-check-input"
                        required
                    >
                    <label class="form-check-label" for="privacy">
                        I agree to the <a href="#">Privacy Policy</a>
                    </label>
                </div>

                <button type="submit" class="btn-signup">Create Account</button>

                <div class="loading" id="loading">
                    <div class="spinner"></div>
                    <p style="margin-top: 0.5rem; color: var(--text-secondary);">Creating account...</p>
                </div>

                <div class="error-message show" id="mainError" style="text-align: center; margin-top: 1rem;"></div>
            </form>

            <div class="auth-link">
                <p>Already have an account? <a href="login.html">Sign In</a></p>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        const signupForm = document.getElementById('signupForm');
        const usernameInput = document.getElementById('username');
        const passwordInput = document.getElementById('password');
        const confirmPasswordInput = document.getElementById('confirmPassword');
        const emailInput = document.getElementById('email');
        const strengthBar = document.getElementById('strengthBar');
        const loading = document.getElementById('loading');
        const mainError = document.getElementById('mainError');

        // Password strength checker
        passwordInput.addEventListener('input', () => {
            const password = passwordInput.value;
            let strength = 0;

            if (password.length >= 8) strength++;
            if (/[a-z]/.test(password)) strength++;
            if (/[A-Z]/.test(password)) strength++;
            if (/[0-9]/.test(password)) strength++;
            if (/[!@#$%^&*]/.test(password)) strength++;

            strengthBar.className = 'password-strength-bar';
            if (strength <= 2) {
                strengthBar.classList.add('weak');
            } else if (strength <= 3) {
                strengthBar.classList.add('medium');
            } else {
                strengthBar.classList.add('strong');
            }
        });

        // Username validation
        usernameInput.addEventListener('change', () => {
            const username = usernameInput.value;
            const usernameError = document.getElementById('usernameError');
            const usernameSuccess = document.getElementById('usernameSuccess');

            if (username.length < 3 || username.length > 20) {
                usernameError.classList.add('show');
                usernameSuccess.classList.remove('show');
            } else if (!/^[a-zA-Z0-9_]+$/.test(username)) {
                usernameError.textContent = '❌ Only letters, numbers, and underscore allowed';
                usernameError.classList.add('show');
                usernameSuccess.classList.remove('show');
            } else {
                usernameError.classList.remove('show');
                usernameSuccess.classList.add('show');
            }
        });

        signupForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const fullname = document.getElementById('fullname').value.trim();
            const email = emailInput.value.trim();
            const username = usernameInput.value.trim();
            const password = passwordInput.value;
            const confirmPassword = confirmPasswordInput.value;
            const termsOk = document.getElementById('terms').checked;
            const privacyOk = document.getElementById('privacy').checked;

            // Validation
            if (!fullname) {
                showError('mainError', '❌ Please enter your full name');
                return;
            }

            if (!email || !email.includes('@')) {
                showError('mainError', '❌ Please enter a valid email');
                return;
            }

            if (username.length < 3 || username.length > 20 || !/^[a-zA-Z0-9_]+$/.test(username)) {
                showError('mainError', '❌ Invalid username format');
                return;
            }

            if (password.length < 8) {
                showError('mainError', '❌ Password must be at least 8 characters');
                return;
            }

            if (password !== confirmPassword) {
                showError('mainError', '❌ Passwords do not match');
                return;
            }

            if (!termsOk || !privacyOk) {
                showError('mainError', '❌ You must agree to terms and privacy policy');
                return;
            }

            loading.classList.add('show');
            mainError.classList.remove('show');

            try {
                const response = await registerUser(username, email, password);
                
                if (response) {
                    loading.classList.remove('show');
                    alert('✅ Account created successfully! Please login.');
                    window.location.href = 'login.html';
                }
            } catch (error) {
                loading.classList.remove('show');
                showError('mainError', '❌ ' + error.message);
            }
        });

        function showError(elementId, message) {
            const errorEl = document.getElementById(elementId);
            errorEl.textContent = message;
            errorEl.classList.add('show');
        }
    </script>
</body>
</html>
